<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TCG STATION TSUNASHIMA - 対戦タイマー</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', 'Hiragino Sans', 'Meiryo', sans-serif;
      background: linear-gradient(135deg, #fdf6ff 0%, #f0f9ff 50%, #f6fff0 100%);
    }

    .container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100vw;
      position: relative;
    }

    /* 背景の装飾ドット */
    .container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image:
        radial-gradient(circle at 10% 20%, rgba(166, 124, 197, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 90% 80%, rgba(91, 174, 232, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 50% 50%, rgba(141, 196, 74, 0.05) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .main-content {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3vw;
      padding: 0 3vw;
      flex: 1;
      min-height: 0;
      position: relative;
      z-index: 1;
    }

    /* ヘッダー：店名 */
    .header {
      padding: 1.5vh 0;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .shop-name {
      font-size: 4vw;
      font-weight: 800;
      color: #1A1A1A;
      letter-spacing: 0.1em;
      display: inline-block;
      padding-bottom: 1vh;
      border-bottom: 4px solid;
      border-image: linear-gradient(90deg, #A67CC5, #5BAEE8, #8DC44A, #E07A50) 1;
    }

    /* タイマーエリア */
    .timer-area {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 2vh 0;
      min-width: 0;
    }

    /* タイマーカード */
    .timer-card {
      background: white;
      border-radius: 2vw;
      padding: 3vh 3vw;
      box-shadow:
        0 10px 40px rgba(166, 124, 197, 0.15),
        0 0 0 3px rgba(166, 124, 197, 0.1);
      position: relative;
      overflow: hidden;
      max-width: 100%;
    }

    .timer-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 6px;
      background: linear-gradient(90deg, #A67CC5, #5BAEE8, #8DC44A, #E07A50);
    }

    .timer-label {
      text-align: center;
      font-size: 1.5vw;
      color: #A67CC5;
      font-weight: 800;
      margin-bottom: 1vh;
      letter-spacing: 0.2em;
    }

    .timer-display {
      font-size: 10vw;
      font-weight: 800;
      color: #1A1A1A;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      transition: all 0.3s ease;
      text-align: center;
    }

    .timer-display.warning {
      color: #E53E3E;
      animation: pulse 1s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }

    .controls {
      display: flex;
      gap: 1.5vw;
      margin-top: 3vh;
      justify-content: center;
    }

    .btn {
      padding: 1.8vh 3vw;
      font-size: 1.6vw;
      font-weight: 700;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      position: relative;
      overflow: hidden;
    }

    .btn::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.3) 0%, transparent 50%);
      pointer-events: none;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.15);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn-start {
      background: linear-gradient(135deg, #8DC44A 0%, #7ab83d 100%);
      color: white;
    }

    .btn-stop {
      background: linear-gradient(135deg, #E07A50 0%, #d06840 100%);
      color: white;
    }

    .btn-reset {
      background: linear-gradient(135deg, #5BAEE8 0%, #4a9dd7 100%);
      color: white;
    }


    /* 左側エリア（動画側） */
    .left-area {
      display: flex;
      flex-direction: column;
      padding: 2vh 0;
      min-width: 0;
    }

    /* YouTubeエリア */
    .youtube-area {
      flex: 1;
      min-height: 0;
    }

    .youtube-wrapper {
      width: 100%;
      height: 100%;
      padding: 4px;
      border-radius: 1.5vw;
      background: linear-gradient(135deg, #A67CC5, #5BAEE8, #8DC44A, #E07A50);
      box-shadow: 0 10px 40px rgba(91, 174, 232, 0.2);
      box-sizing: border-box;
    }

    .youtube-wrapper iframe {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 1.2vw;
      display: block;
    }

    /* チャンネル登録エリア */
    .subscribe-area {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2vw;
      padding: 1.5vh 0;
      background: white;
      border-radius: 1vw;
      margin-top: 1.5vh;
      box-shadow: 0 5px 20px rgba(224, 122, 80, 0.15);
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }

    .subscribe-area::before {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #A67CC5, #5BAEE8, #8DC44A, #E07A50);
    }

    .subscribe-text {
      font-size: 2vw;
      font-weight: 700;
      color: #1A1A1A;
      text-align: center;
      line-height: 1.5;
    }

    .subscribe-text .highlight {
      font-size: 2.8vw;
      background: linear-gradient(135deg, #E07A50 0%, #d06840 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .qr-code {
      width: 14vh;
      height: 14vh;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      padding: 0.5vh;
      background: white;
    }

    /* フッター：カラーバー */
    .color-bar {
      flex: 0 0 1.2vh;
      display: flex;
      width: 100%;
      position: relative;
      z-index: 1;
    }

    .color-bar-segment {
      flex: 1;
      height: 100%;
    }

    .color-purple { background: linear-gradient(90deg, #A67CC5, #b88dd6); }
    .color-blue { background: linear-gradient(90deg, #5BAEE8, #7cc0f0); }
    .color-green { background: linear-gradient(90deg, #8DC44A, #a0d45d); }
    .color-orange { background: linear-gradient(90deg, #E07A50, #e99070); }

    /* 装飾用の浮遊するドット */
    .floating-dots {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .dot {
      position: absolute;
      border-radius: 50%;
      opacity: 0.3;
      animation: float 6s ease-in-out infinite;
    }

    .dot:nth-child(1) {
      width: 3vw; height: 3vw;
      background: #A67CC5;
      top: 15%; left: 5%;
      animation-delay: 0s;
    }

    .dot:nth-child(2) {
      width: 2vw; height: 2vw;
      background: #5BAEE8;
      top: 70%; left: 8%;
      animation-delay: 1s;
    }

    .dot:nth-child(3) {
      width: 2.5vw; height: 2.5vw;
      background: #8DC44A;
      top: 25%; right: 5%;
      animation-delay: 2s;
    }

    .dot:nth-child(4) {
      width: 1.5vw; height: 1.5vw;
      background: #E07A50;
      top: 80%; right: 10%;
      animation-delay: 3s;
    }

    .dot:nth-child(5) {
      width: 2vw; height: 2vw;
      background: #A67CC5;
      top: 50%; left: 48%;
      animation-delay: 4s;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-1vh) rotate(5deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 装飾ドット -->
    <div class="floating-dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>

    <!-- ヘッダー：店名 -->
    <header class="header">
      <h1 class="shop-name">TCG STATION TSUNASHIMA</h1>
    </header>

    <!-- メインコンテンツ（左右配置） -->
    <div class="main-content">
      <!-- 左側エリア（動画 + QRコード） -->
      <div class="left-area">
        <!-- YouTubeエリア -->
        <section class="youtube-area">
          <div class="youtube-wrapper">
            <!-- ============================================== -->
            <!-- ここにYouTube再生リストのURLを入れる           -->
            <!-- YOUR_PLAYLIST_ID を実際のプレイリストIDに変更  -->
            <!-- 例: PLxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx        -->
            <!-- ============================================== -->
            <iframe
              src="https://www.youtube.com/embed/videoseries?list=PLou8fhsKysc3qEC8m2-E8JUhg0-VxYB_a&autoplay=1&controls=1&loop=1&mute=1"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
              allowfullscreen>
            </iframe>
          </div>
        </section>

        <!-- チャンネル登録エリア -->
        <div class="subscribe-area">
          <img
            class="qr-code"
            src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://www.youtube.com/channel/UCHVjkbzttO4-Cvty9J6QIdA"
            alt="チャンネルQRコード"
          >
          <p class="subscribe-text"><span class="highlight">チャンネル登録</span>と<span class="highlight">コメント</span><br>よろしくお願いします！</p>
        </div>
      </div>

      <!-- タイマーエリア（右） -->
      <section class="timer-area">
        <div class="timer-card">
          <div class="timer-label">BATTLE TIMER</div>
          <div class="timer-display" id="timerDisplay">25:00</div>

          <div class="controls">
            <button class="btn btn-start" id="startBtn" onclick="startTimer()">START</button>
            <button class="btn btn-stop" id="stopBtn" onclick="stopTimer()">STOP</button>
            <button class="btn btn-reset" onclick="resetTimer()">RESET</button>
          </div>

        </div>
      </section>
    </div>

    <!-- フッター：カラーバー -->
    <footer class="color-bar">
      <div class="color-bar-segment color-purple"></div>
      <div class="color-bar-segment color-blue"></div>
      <div class="color-bar-segment color-green"></div>
      <div class="color-bar-segment color-orange"></div>
    </footer>
  </div>

  <script>
    // タイマー変数
    let totalSeconds = 25 * 60; // デフォルト25分
    let initialSeconds = 25 * 60;
    let timerInterval = null;
    let isRunning = false;

    const timerDisplay = document.getElementById('timerDisplay');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');

    // タイマー表示を更新
    function updateDisplay() {
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;
      const display = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
      timerDisplay.textContent = display;

      // 残り3分を切ったら警告色に
      if (totalSeconds < 180) {
        timerDisplay.classList.add('warning');
      } else {
        timerDisplay.classList.remove('warning');
      }
    }

    // タイマースタート
    function startTimer() {
      if (isRunning) return;
      if (totalSeconds <= 0) return;

      isRunning = true;
      timerInterval = setInterval(() => {
        if (totalSeconds > 0) {
          totalSeconds--;
          updateDisplay();
        } else {
          stopTimer();
        }
      }, 1000);
    }

    // タイマーストップ
    function stopTimer() {
      isRunning = false;
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }
    }

    // タイマーリセット
    function resetTimer() {
      stopTimer();
      totalSeconds = initialSeconds;
      updateDisplay();
    }

    // 初期表示
    updateDisplay();
  </script>
</body>
</html>
