<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TCG STATION TSUNASHIMA - チャンネル紹介</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', 'Hiragino Sans', 'Meiryo', sans-serif;
      background: linear-gradient(135deg, #fdf6ff 0%, #f0f9ff 50%, #f6fff0 100%);
    }

    .container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100vw;
      position: relative;
    }

    .container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image:
        radial-gradient(circle at 10% 20%, rgba(166, 124, 197, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 90% 80%, rgba(91, 174, 232, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 50% 50%, rgba(141, 196, 74, 0.05) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .header {
      padding: 1.5vh 0;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .shop-name {
      font-size: 4vw;
      font-weight: 800;
      color: #1A1A1A;
      letter-spacing: 0.1em;
      display: inline-block;
      padding-bottom: 1vh;
      border-bottom: 4px solid;
      border-image: linear-gradient(90deg, #A67CC5, #5BAEE8, #8DC44A, #E07A50) 1;
    }

    .main-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      min-height: 0;
      padding: 1vh 3vw;
      gap: 1.5vh;
      position: relative;
      z-index: 1;
    }

    /* 日付・時刻カード */
    .datetime-card {
      background: white;
      border-radius: 2vw;
      padding: 2vh 4vw;
      box-shadow:
        0 10px 40px rgba(91, 174, 232, 0.15),
        0 0 0 3px rgba(91, 174, 232, 0.1);
      text-align: center;
      position: relative;
      overflow: hidden;
      width: 50vw;
      flex-shrink: 0;
    }

    .datetime-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 6px;
      background: linear-gradient(90deg, #5BAEE8, #8DC44A);
    }

    .current-date {
      font-size: 2.2vw;
      font-weight: 700;
      color: #555;
      letter-spacing: 0.1em;
    }

    .current-time {
      font-size: 6vw;
      font-weight: 800;
      color: #1A1A1A;
      line-height: 1.1;
      font-variant-numeric: tabular-nums;
    }

    /* YouTubeエリア */
    .youtube-area {
      width: 50vw;
      flex: 1;
      min-height: 0;
    }

    .youtube-wrapper {
      width: 100%;
      height: 100%;
      padding: 4px;
      border-radius: 1.5vw;
      background: linear-gradient(135deg, #A67CC5, #5BAEE8, #8DC44A, #E07A50);
      box-shadow: 0 10px 40px rgba(91, 174, 232, 0.2);
      box-sizing: border-box;
    }

    .youtube-wrapper iframe,
    .youtube-wrapper #ytPlayer {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 1.2vw;
      display: block;
    }

    /* チャンネル登録エリア */
    .subscribe-area {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2vw;
      padding: 1.5vh 3vw;
      background: white;
      border-radius: 1vw;
      box-shadow: 0 5px 20px rgba(224, 122, 80, 0.15);
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
      width: 50vw;
    }

    .subscribe-area::before {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #A67CC5, #5BAEE8, #8DC44A, #E07A50);
    }

    .subscribe-text {
      font-size: 2vw;
      font-weight: 700;
      color: #1A1A1A;
      text-align: center;
      line-height: 1.5;
    }

    .subscribe-text .highlight {
      font-size: 2.8vw;
      background: linear-gradient(135deg, #E07A50 0%, #d06840 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .qr-code {
      width: 14vh;
      height: 14vh;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      padding: 0.5vh;
      background: white;
    }

    /* ナビゲーションボタン */
    .nav-btn {
      position: fixed;
      bottom: 3vh;
      right: 3vw;
      z-index: 100;
      padding: 1.5vh 2.5vw;
      font-size: 1.4vw;
      font-weight: 700;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      background: linear-gradient(135deg, #A67CC5 0%, #5BAEE8 100%);
      color: white;
      box-shadow: 0 4px 20px rgba(166, 124, 197, 0.4);
      transition: all 0.2s ease;
      text-decoration: none;
      display: inline-block;
    }

    .nav-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 25px rgba(166, 124, 197, 0.5);
    }

    /* フッター：カラーバー */
    .color-bar {
      flex: 0 0 1.2vh;
      display: flex;
      width: 100%;
      position: relative;
      z-index: 1;
    }

    .color-bar-segment {
      flex: 1;
      height: 100%;
    }

    .color-purple { background: linear-gradient(90deg, #A67CC5, #b88dd6); }
    .color-blue { background: linear-gradient(90deg, #5BAEE8, #7cc0f0); }
    .color-green { background: linear-gradient(90deg, #8DC44A, #a0d45d); }
    .color-orange { background: linear-gradient(90deg, #E07A50, #e99070); }

    /* 装飾ドット */
    .floating-dots {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .dot {
      position: absolute;
      border-radius: 50%;
      opacity: 0.3;
      animation: float 6s ease-in-out infinite;
    }

    .dot:nth-child(1) { width: 3vw; height: 3vw; background: #A67CC5; top: 15%; left: 5%; animation-delay: 0s; }
    .dot:nth-child(2) { width: 2vw; height: 2vw; background: #5BAEE8; top: 70%; left: 8%; animation-delay: 1s; }
    .dot:nth-child(3) { width: 2.5vw; height: 2.5vw; background: #8DC44A; top: 25%; right: 5%; animation-delay: 2s; }
    .dot:nth-child(4) { width: 1.5vw; height: 1.5vw; background: #E07A50; top: 80%; right: 10%; animation-delay: 3s; }
    .dot:nth-child(5) { width: 2vw; height: 2vw; background: #A67CC5; top: 50%; left: 48%; animation-delay: 4s; }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-1vh) rotate(5deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="floating-dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>

    <header class="header">
      <h1 class="shop-name">TCG STATION TSUNASHIMA</h1>
    </header>

    <div class="main-content">
      <!-- 時計 -->
      <div class="datetime-card">
        <div class="current-date" id="currentDate"></div>
        <div class="current-time" id="currentTime"></div>
      </div>

      <!-- YouTube -->
      <section class="youtube-area">
        <div class="youtube-wrapper">
          <div id="ytPlayer"></div>
        </div>
      </section>

      <!-- チャンネル登録QR -->
      <div class="subscribe-area">
        <img
          class="qr-code"
          src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://www.youtube.com/channel/UCHVjkbzttO4-Cvty9J6QIdA"
          alt="チャンネルQRコード"
        >
        <p class="subscribe-text"><span class="highlight">チャンネル登録</span>と<span class="highlight">コメント</span><br>よろしくお願いします！</p>
      </div>
    </div>

    <footer class="color-bar">
      <div class="color-bar-segment color-purple"></div>
      <div class="color-bar-segment color-blue"></div>
      <div class="color-bar-segment color-green"></div>
      <div class="color-bar-segment color-orange"></div>
    </footer>
  </div>

  <!-- ページ切り替えボタン -->
  <a class="nav-btn" href="index.html">TIMER PAGE</a>

  <script>
    // === YouTube IFrame Player API ===
    const PLAYLIST_ID = 'PLou8fhsKysc3qEC8m2-E8JUhg0-VxYB_a';
    let ytPlayer = null;

    const tag = document.createElement('script');
    tag.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(tag);

    function onYouTubeIframeAPIReady() {
      createPlayer();
    }

    function createPlayer() {
      if (ytPlayer) {
        ytPlayer.destroy();
      }
      ytPlayer = new YT.Player('ytPlayer', {
        width: '100%',
        height: '100%',
        playerVars: {
          list: PLAYLIST_ID,
          listType: 'playlist',
          autoplay: 1,
          controls: 1,
          loop: 1,
          mute: 1,
          rel: 0
        },
        events: {
          onError: onPlayerError,
          onStateChange: onPlayerStateChange
        }
      });
    }

    function onPlayerError(event) {
      console.warn('YouTube error:', event.data, '- 自動復旧します');
      if (event.data === 100 || event.data === 101 || event.data === 150) {
        setTimeout(() => {
          if (ytPlayer && typeof ytPlayer.nextVideo === 'function') {
            ytPlayer.nextVideo();
          }
        }, 2000);
      } else {
        setTimeout(() => createPlayer(), 3000);
      }
    }

    function onPlayerStateChange(event) {
      if (event.data === YT.PlayerState.ENDED) {
        ytPlayer.playVideoAt(0);
      }
    }

    // === 日付・時刻表示 ===
    const dateEl = document.getElementById('currentDate');
    const timeEl = document.getElementById('currentTime');
    const weekdays = ['日', '月', '火', '水', '木', '金', '土'];

    function updateClock() {
      const now = new Date();
      const y = now.getFullYear();
      const m = (now.getMonth() + 1).toString().padStart(2, '0');
      const d = now.getDate().toString().padStart(2, '0');
      const w = weekdays[now.getDay()];
      dateEl.textContent = `${y}.${m}.${d}（${w}）`;

      const hh = now.getHours().toString().padStart(2, '0');
      const mm = now.getMinutes().toString().padStart(2, '0');
      timeEl.textContent = `${hh}:${mm}`;
    }

    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
